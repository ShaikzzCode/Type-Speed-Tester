<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />

    <title>Type Speed Tester</title>
  </head>

  <body>
    <header>
      <span class="siteTitle">Type Speed Tester</span>
      <button class="testAgainBtn">Test Again</button>
    </header>
    <div class="wrapper">
      <input type="text" class="input-field" />
      <div class="content-box">
        

        <div class="content">
            <ul class="result-details">
              <li class="timeLeft">
                <p>time Left:</p>
                <span><b>60</b>s</span>
              </li>
              <li class="errors">
                <p>Errors:</p>
                <span>0</span>
              </li>
              <li class="wpm">
                <p>WPM:</p>
                <span>0</span>
              </li>
              <li class="cpm">
                <p>CPM:</p>
                <span>0</span>
              </li>
            </ul>
          </div>

        <div class="typing-text">
          <p></p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
